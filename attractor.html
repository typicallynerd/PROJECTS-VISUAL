<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attractor Loop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #05020f url("WhatsApp Image 2026-07-02 at 23.33.43.jpeg") center / cover no-repeat fixed;
    color: #e8e0f5;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 8px 20px;
    border-bottom: 1px solid #1a0f2e;
    background: linear-gradient(90deg, #0d0720, #05020f);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; color: #c084fc; letter-spacing: 3px; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .pill-btn {
    padding: 5px 14px; border-radius: 20px; border: 1px solid #7c3aed;
    background: transparent; color: #c084fc; font-size: 11px; cursor: pointer;
    font-family: inherit; letter-spacing: 1px; transition: all 0.2s;
  }
  .pill-btn:hover, .pill-btn.active { background: #7c3aed; color: #fff; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .canvas-wrap {
    flex: 1; display: flex; align-items: center;
    justify-content: center; padding: 12px; position: relative;
    cursor: crosshair;
  }
  .click-hint {
    position: absolute; top: 24px; right: 24px; font-size: 10px;
    color: rgba(192,132,252,0.6); letter-spacing: 2px;
    pointer-events: none; text-shadow: 0 0 8px #7c3aed;
  }
  .click-ripple {
    position: absolute; width: 10px; height: 10px; margin: -5px 0 0 -5px;
    border-radius: 50%; border: 1px solid #c084fc; pointer-events: none;
    animation: rippleFade 0.6s ease-out forwards;
  }
  @keyframes rippleFade {
    0% { transform: scale(0.3); opacity: 0.9; }
    100% { transform: scale(6); opacity: 0; }
  }
  canvas {
    border-radius: 6px; border: 1px solid #1a0f2e;
    box-shadow: 0 0 80px #7c3aed55, 0 0 160px #7c3aed22; display: block;
  }
  .eq-overlay {
    position: absolute; top: 24px; left: 24px; font-size: 12px;
    color: rgba(192,132,252,0.7); line-height: 1.7;
    pointer-events: none; text-shadow: 0 0 8px #7c3aed;
  }
  .morph-bar-wrap {
    position: absolute; bottom: 24px; left: 50%;
    transform: translateX(-50%); width: 180px;
  }
  .morph-label { font-size: 10px; color: #7c3aed; letter-spacing: 2px; text-align: center; margin-bottom: 5px; }
  .morph-bar-bg { width: 100%; height: 2px; background: #1a0f2e; border-radius: 2px; overflow: hidden; }
  .morph-bar-fill {
    height: 100%; background: linear-gradient(90deg, #7c3aed, #c084fc);
    border-radius: 2px; transition: width 0.05s linear;
  }
  .panel {
    width: 230px; flex-shrink: 0; background: #0a0618;
    border-left: 1px solid #1a0f2e; overflow-y: auto;
    padding: 14px; display: flex; flex-direction: column; gap: 16px;
  }
  .section-label { font-size: 10px; color: #7c3aed; letter-spacing: 2px; margin-bottom: 8px; }
  .type-btn {
    display: block; width: 100%; text-align: left; padding: 6px 10px;
    margin-bottom: 3px; border-radius: 3px; border: 1px solid #1a0f2e;
    background: transparent; color: #8b7aa8; font-size: 11px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .type-btn.active { border-color: #7c3aed; background: #1a0f2e; color: #c084fc; }
  .palette-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 6px 10px; margin-bottom: 3px; border-radius: 3px;
    border: 1px solid #1a0f2e; background: transparent; color: #8b7aa8;
    font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .palette-btn.active { border-color: #7c3aed; background: #1a0f2e; color: #c084fc; }
  .swatch { width: 9px; height: 9px; border-radius: 2px; }
  .swatches { display: flex; gap: 2px; }
  .slider-row { margin-bottom: 12px; }
  .slider-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .slider-key { font-size: 10px; color: #c084fc; letter-spacing: 1px; }
  .slider-val { font-size: 10px; color: #e8e0f5; }
  input[type=range] { width: 100%; accent-color: #7c3aed; cursor: pointer; background: transparent; }
  .speed-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .speed-btn {
    flex: 1; padding: 5px 6px; border-radius: 3px; border: 1px solid #1a0f2e;
    background: transparent; color: #8b7aa8; font-size: 10px;
    cursor: pointer; font-family: inherit; text-align: center; transition: all 0.15s;
  }
  .speed-btn.active { border-color: #7c3aed; background: #1a0f2e; color: #c084fc; }
  .big-btn {
    padding: 9px; border-radius: 4px; border: 1px solid #7c3aed;
    background: linear-gradient(135deg, #1a0f2e, #0d0720); color: #c084fc;
    font-size: 11px; cursor: pointer; font-family: inherit; letter-spacing: 2px;
    box-shadow: 0 0 12px #7c3aed44; width: 100%; transition: box-shadow 0.2s;
  }
  .big-btn:hover { box-shadow: 0 0 24px #7c3aed88; }
  body.immersive header, body.immersive .panel { display: none; }
  body.immersive .canvas-wrap { padding: 0; }
  #panelDynamic { display: flex; flex-direction: column; gap: 16px; }
  #audioPanel { display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #1a0f2e; padding-top: 14px; margin-top: 16px; }
  #audioEl { height: 30px; }
  #audioTrackName { font-size: 10px; color: #8b7aa8; word-break: break-all; }
</style>
</head>
<body>

<header>
  <h1>◈ ATTRACTOR LAB — LIVE</h1>
  <div class="header-right">
    <button class="pill-btn active" id="playBtn">⏸ PAUSE</button>
    <button class="pill-btn" id="snapBtn">⟳ NEW SHAPE</button>
    <button class="pill-btn" id="fsBtn">⛶ FULL</button>
  </div>
</header>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="eq-overlay" id="eqOverlay"></div>
    <div class="click-hint">CLICK IMAGE TO RESHAPE</div>
    <div class="morph-bar-wrap">
      <div class="morph-label">MORPHING…</div>
      <div class="morph-bar-bg"><div class="morph-bar-fill" id="morphBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="panel">
    <div id="panelDynamic"></div>
    <div id="audioPanel">
      <div class="section-label">AUDIO REACTIVE</div>
      <div id="audioTrackName">no track loaded</div>
      <button class="big-btn" id="audioLoadBtn">🎵 LOAD TRACK</button>
      <input type="file" id="audioFileInput" accept="audio/*" style="display:none">
      <audio id="audioEl" controls style="width:100%;display:none;"></audio>
      <button class="pill-btn" id="audioReactToggle" style="width:100%;display:none;">REACT: OFF</button>
      <div class="slider-row" id="wobbleRow" style="display:none;margin-bottom:0;">
        <div class="slider-header"><span class="slider-key">REACT AMOUNT</span><span class="slider-val" id="wobble-val">50%</span></div>
        <input type="range" id="wobbleSlider" min="0" max="100" step="1" value="50">
      </div>
      <div class="slider-row" id="sensRow" style="display:none;margin-bottom:0;">
        <div class="slider-header"><span class="slider-key">BEAT SENSITIVITY</span><span class="slider-val" id="sens-val">60%</span></div>
        <input type="range" id="sensSlider" min="0" max="100" step="1" value="60">
      </div>
    </div>
  </div>
</div>

<script>
const ATTRACTORS = {
  "de Jong": {
    eqs: (p) => [`x = sin(${p.a.toFixed(2)}·y) − cos(${p.b.toFixed(2)}·x)`, `y = sin(${p.c.toFixed(2)}·x) − cos(${p.d.toFixed(2)}·y)`],
    params: ["a","b","c","d"],
    fn: (x,y,p) => [Math.sin(p.a*y)-Math.cos(p.b*x), Math.sin(p.c*x)-Math.cos(p.d*y)],
    presets: [
      {a:1.641,b:1.902,c:0.316,d:1.525},{a:-2.24,b:0.43,c:-0.65,d:-2.43},
      {a:2.01,b:-2.53,c:1.61,d:-0.33},{a:-1.60,b:1.02,c:-1.90,d:0.50},
      {a:0.97,b:-1.93,c:0.50,d:0.99},{a:-1.84,b:1.75,c:0.16,d:-1.59},
      {a:1.40,b:-2.10,c:1.20,d:-0.80},{a:-0.82,b:0.39,c:-0.59,d:-2.13},
    ],
  },
  "Clifford": {
    eqs: (p) => [`x = sin(${p.a.toFixed(2)}·y) + ${p.c.toFixed(2)}·cos(${p.a.toFixed(2)}·x)`, `y = sin(${p.b.toFixed(2)}·x) + ${p.d.toFixed(2)}·cos(${p.b.toFixed(2)}·y)`],
    params: ["a","b","c","d"],
    fn: (x,y,p) => [Math.sin(p.a*y)+p.c*Math.cos(p.a*x), Math.sin(p.b*x)+p.d*Math.cos(p.b*y)],
    presets: [
      {a:-1.4,b:1.6,c:1.0,d:0.7},{a:-1.7,b:1.8,c:-0.9,d:-0.4},
      {a:1.5,b:-1.8,c:1.6,d:0.9},{a:-1.9,b:-1.9,c:-1.9,d:-1.0},
      {a:2.0,b:-1.1,c:0.5,d:0.9},{a:-1.3,b:1.7,c:-0.6,d:1.5},
    ],
  },
  "Simone": {
    eqs: (p) => [`x = sin(x²−y²+${p.a.toFixed(2)})`, `y = cos(2xy+${p.b.toFixed(2)})`],
    params: ["a","b"],
    fn: (x,y,p) => [Math.sin(x*x-y*y+p.a), Math.cos(2*x*y+p.b)],
    presets: [
      {a:1.7,b:0.5},{a:2.1,b:1.2},{a:0.9,b:2.3},{a:1.4,b:0.1},
      {a:2.5,b:0.8},{a:0.5,b:1.9},{a:1.1,b:2.8},{a:2.9,b:0.3},
    ],
  },
  "Bedhead": {
    eqs: (p) => [`x = sin(xy/${p.b.toFixed(2)})·y + cos(${p.a.toFixed(2)}x−y)`, `y = x + sin(y)/${p.b.toFixed(2)}`],
    params: ["a","b"],
    fn: (x,y,p) => { if(Math.abs(p.b)<0.01) return [x,y];
      return [Math.sin(x*y/p.b)*y+Math.cos(p.a*x-y), x+Math.sin(y)/p.b]; },
    presets: [
      {a:-0.81,b:-0.92},{a:0.40,b:1.10},{a:-1.20,b:0.70},
      {a:0.95,b:-0.55},{a:-0.50,b:1.30},{a:1.10,b:-0.80},
    ],
  },
};

const PALETTES = {
  "Plasma":     ["#200010","#6a0035","#c8003a","#ff6b35","#f7c59f","#fff8f0"],
  "Cyan Fire":  ["#001220","#003355","#0077aa","#00aacc","#00d4ff","#ccf7ff"],
  "Violet Gold":["#1a0030","#6600aa","#cc44ff","#ffaa00","#ffcc44","#fff8cc"],
  "Matrix":     ["#001200","#004400","#008800","#00cc00","#00ff41","#ccffcc"],
  "Rose Ice":   ["#1a0030","#660055","#cc0077","#ff44aa","#ff99cc","#fff0f8"],
  "Solar":      ["#0a0500","#4a1500","#aa4400","#ff7700","#ffcc00","#fffff0"],
};

let state = { type: "de Jong", palette: "Plasma", points: 80000, speed: 0.004, playing: true, audioReactive: false, audioWobble: 0.5, beatSensitivity: 0.17 };
let fromParams = {...ATTRACTORS["de Jong"].presets[0]};
let toParams   = {...ATTRACTORS["de Jong"].presets[1]};
let morphT = 0, presetIdx = 1;
let iterX = 0.1, iterY = 0.1;
let cachedBounds = null;
const POINTS_PER_FRAME = 3000;

function lerpParams(a,b,t){ const o={}; for(const k of Object.keys(a)) o[k]=a[k]+(b[k]-a[k])*t; return o; }

// --- Audio-reactive analysis ---
const audioEl=document.getElementById("audioEl");
let audioCtx=null, analyser=null, freqData=null, audioGraphReady=false;
let bandAvg={bass:0,mid:0,treble:0}, lastBeatTime=0, audioFrameCount=0;

function bandEnergy(data,from,to){
  let sum=0,count=0;
  for(let i=from;i<to && i<data.length;i++){ sum+=data[i]; count++; }
  return count?(sum/count)/255:0;
}

function setupAudioGraph(){
  if(audioGraphReady) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=1024;
  freqData=new Uint8Array(analyser.frequencyBinCount);
  const src=audioCtx.createMediaElementSource(audioEl);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
  audioGraphReady=true;
}

function loadAudioFile(file){
  audioEl.src=URL.createObjectURL(file);
  audioEl.style.display="block";
  document.getElementById("audioTrackName").textContent=file.name;
  setupAudioGraph();
  state.audioReactive=true;
  bandAvg={bass:0,mid:0,treble:0};
  const toggle=document.getElementById("audioReactToggle");
  toggle.style.display="block"; toggle.textContent="REACT: ON"; toggle.classList.add("active");
  document.getElementById("wobbleRow").style.display="block";
  document.getElementById("sensRow").style.display="block";
}

document.getElementById("audioLoadBtn").onclick=()=>document.getElementById("audioFileInput").click();
document.getElementById("audioFileInput").onchange=e=>{ if(e.target.files[0]) loadAudioFile(e.target.files[0]); };
document.getElementById("audioReactToggle").onclick=function(){
  state.audioReactive=!state.audioReactive;
  this.textContent=state.audioReactive?"REACT: ON":"REACT: OFF";
  this.classList.toggle("active",state.audioReactive);
};
document.getElementById("wobbleSlider").oninput=e=>{
  state.audioWobble=parseInt(e.target.value)/100;
  document.getElementById("wobble-val").textContent=e.target.value+"%";
};
document.getElementById("sensSlider").oninput=e=>{
  const v=parseInt(e.target.value);
  state.beatSensitivity=0.35-(v/100)*0.30;
  document.getElementById("sens-val").textContent=v+"%";
};
audioEl.addEventListener("play",()=>{ if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); });

function nextPreset(){
  const p=ATTRACTORS[state.type].presets;
  fromParams={...toParams};
  presetIdx=(presetIdx+1)%p.length;
  toParams={...p[presetIdx]};
  morphT=0;
}

function randomPreset(){
  fromParams=lerpParams(fromParams,toParams,morphT);
  toParams={};
  ATTRACTORS[state.type].params.forEach(k=>toParams[k]=parseFloat((Math.random()*4-2).toFixed(3)));
  morphT=0;
}

const BG_IMAGE_SRC = "WhatsApp Image 2026-07-02 at 23.33.43.jpeg";
let bgSampleCanvas=null, bgSampleCtx=null, bgImageReady=false;

function loadBgSampler(src){
  bgImageReady=false;
  const img=new Image();
  img.onload=function(){
    bgSampleCanvas=document.createElement("canvas");
    bgSampleCanvas.width=img.naturalWidth; bgSampleCanvas.height=img.naturalHeight;
    bgSampleCtx=bgSampleCanvas.getContext("2d");
    bgSampleCtx.drawImage(img,0,0);
    bgImageReady=true;
  };
  img.src=src;
}
loadBgSampler(BG_IMAGE_SRC);

function loadNewPhoto(file){
  const reader=new FileReader();
  reader.onload=function(ev){
    document.body.style.backgroundImage=`url("${ev.target.result}")`;
    loadBgSampler(ev.target.result);
  };
  reader.readAsDataURL(file);
}

function paramsFromImagePoint(clientX,clientY){
  if(!bgImageReady) return null;
  const vw=document.documentElement.clientWidth, vh=document.documentElement.clientHeight;
  const iw=bgSampleCanvas.width, ih=bgSampleCanvas.height;
  const scale=Math.max(vw/iw, vh/ih);
  const dw=iw*scale, dh=ih*scale;
  const offX=(vw-dw)/2, offY=(vh-dh)/2;
  let ix=(clientX-offX)/scale, iy=(clientY-offY)/scale;
  ix=Math.min(Math.max(ix,0),iw-1); iy=Math.min(Math.max(iy,0),ih-1);
  const toRange=v=>(v*4)-2;
  try{
    const px=bgSampleCtx.getImageData(Math.floor(ix),Math.floor(iy),1,1).data;
    const r=px[0]/255, g=px[1]/255, b=px[2]/255, bright=(px[0]+px[1]+px[2])/(3*255);
    return {a:toRange(r), b:toRange(g), c:toRange(b), d:toRange(bright)};
  }catch(err){
    // Canvas is cross-origin tainted under file:// in some browsers — fall back
    // to the click's position within the image so the feature still works.
    const fx=ix/iw, fy=iy/ih;
    return {a:toRange(fx), b:toRange(fy), c:toRange(1-fx), d:toRange(1-fy)};
  }
}

function reshapeFromImagePoint(clientX,clientY){
  const sample=paramsFromImagePoint(clientX,clientY);
  if(!sample) return;
  fromParams=lerpParams(fromParams,toParams,morphT);
  const target={};
  ATTRACTORS[state.type].params.forEach(k=>target[k]=sample[k]);
  toParams=target;
  morphT=0;
  cachedBounds=null;
}

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let offscreen, offCtx;

function resizeCanvas(){
  const wrap=canvas.parentElement;
  const cap=document.body.classList.contains("immersive")?2000:700;
  const size=Math.min(wrap.clientWidth-32,wrap.clientHeight-32,cap);
  canvas.width=size; canvas.height=size;
  offscreen=document.createElement("canvas");
  offscreen.width=size; offscreen.height=size;
  offCtx=offscreen.getContext("2d");
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

document.querySelector(".canvas-wrap").addEventListener("click",function(e){
  reshapeFromImagePoint(e.clientX,e.clientY);
  const ripple=document.createElement("div");
  ripple.className="click-ripple";
  ripple.style.left=(e.clientX-this.getBoundingClientRect().left)+"px";
  ripple.style.top=(e.clientY-this.getBoundingClientRect().top)+"px";
  this.appendChild(ripple);
  setTimeout(()=>ripple.remove(),600);
});

function computeBounds(params){
  const att=ATTRACTORS[state.type];
  let x=0.1,y=0.1,mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  for(let i=0;i<5000;i++){
    const r=att.fn(x,y,params);
    if(!isFinite(r[0])||!isFinite(r[1])){x=0.1;y=0.1;continue;}
    x=r[0];y=r[1];
    if(x<mnX)mnX=x;if(x>mxX)mxX=x;if(y<mnY)mnY=y;if(y>mxY)mxY=y;
  }
  return {minX:mnX,maxX:mxX,minY:mnY,maxY:mxY};
}

function getScale(b){
  const W=canvas.width,H=canvas.height,pad=40;
  const rX=b.maxX-b.minX||1,rY=b.maxY-b.minY||1;
  const scale=Math.min((W-pad*2)/rX,(H-pad*2)/rY);
  return {scale,offX:(W-rX*scale)/2-b.minX*scale,offY:(H-rY*scale)/2-b.minY*scale};
}

window._ppf=POINTS_PER_FRAME; window._trail=0.96;

const _patchedLoop=function(){
  if(!state.playing){requestAnimationFrame(_patchedLoop);return;}
  morphT+=state.speed;
  if(morphT>=1){morphT=1;cachedBounds=null;nextPreset();}
  document.getElementById("morphBar").style.width=(morphT*100)+"%";
  const ease=t=>t<0.5?2*t*t:-1+(4-2*t)*t;
  const baseParams=lerpParams(fromParams,toParams,ease(Math.min(morphT,1)));
  let params=baseParams;
  if(state.audioReactive && audioGraphReady && !audioEl.paused){
    analyser.getByteFrequencyData(freqData);
    const n=freqData.length;
    const bass=bandEnergy(freqData,0,Math.floor(n*0.06));
    const mid=bandEnergy(freqData,Math.floor(n*0.06),Math.floor(n*0.25));
    const treble=bandEnergy(freqData,Math.floor(n*0.25),Math.floor(n*0.6));
    const alpha=0.06;
    bandAvg.bass+=(bass-bandAvg.bass)*alpha;
    bandAvg.mid+=(mid-bandAvg.mid)*alpha;
    bandAvg.treble+=(treble-bandAvg.treble)*alpha;
    params={...baseParams};
    const keys=ATTRACTORS[state.type].params;
    const devs=[bass-bandAvg.bass, mid-bandAvg.mid, treble-bandAvg.treble];
    keys.forEach((k,i)=>{ params[k]+=devs[i%3]*state.audioWobble*2.2; });
    const now=performance.now();
    if(bass>0.12 && (bass-bandAvg.bass)>state.beatSensitivity && now-lastBeatTime>170){
      lastBeatTime=now;
      randomPreset();
      cachedBounds=null;
    }
    audioFrameCount++;
    if(audioFrameCount%90===0) cachedBounds=computeBounds(params);
  }
  document.getElementById("eqOverlay").innerHTML=ATTRACTORS[state.type].eqs(params).join("<br>");
  ATTRACTORS[state.type].params.forEach(k=>{
    const el=document.getElementById("live-"+k); if(el)el.textContent=params[k].toFixed(3);
    const bar=document.getElementById("bar-"+k); if(bar)bar.style.width=(((params[k]+2)/4)*100).toFixed(1)+"%";
  });
  const W=canvas.width,H=canvas.height;
  offCtx.globalCompositeOperation="destination-out";
  offCtx.fillStyle="rgba(0,0,0,"+(1-window._trail)+")";
  offCtx.fillRect(0,0,W,H);
  offCtx.globalCompositeOperation="source-over";
  const att=ATTRACTORS[state.type],pal=PALETTES[state.palette];
  if(!cachedBounds)cachedBounds=computeBounds(params);
  const sc=getScale(cachedBounds),ppf=window._ppf;
  offCtx.globalAlpha=0.4;
  for(let i=0;i<ppf;i++){
    const r=att.fn(iterX,iterY,params);
    if(!isFinite(r[0])||!isFinite(r[1])){iterX=0.1;iterY=0.1;continue;}
    iterX=r[0];iterY=r[1];
    offCtx.fillStyle=pal[Math.floor((i/ppf)*pal.length)];
    offCtx.fillRect(iterX*sc.scale+sc.offX,iterY*sc.scale+sc.offY,1.5,1.5);
  }
  offCtx.globalAlpha=1; ctx.clearRect(0,0,W,H); ctx.drawImage(offscreen,0,0);
  requestAnimationFrame(_patchedLoop);
};

document.getElementById("playBtn").onclick=function(){
  state.playing=!state.playing;
  this.textContent=state.playing?"⏸ PAUSE":"▶ PLAY";
  this.classList.toggle("active",state.playing);
};
document.getElementById("snapBtn").onclick=function(){
  randomPreset(); cachedBounds=null; iterX=0.1; iterY=0.1;
};
document.getElementById("fsBtn").onclick=function(){
  document.body.classList.add("immersive");
  if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  resizeCanvas();
};
document.addEventListener("fullscreenchange",function(){
  if(!document.fullscreenElement){
    document.body.classList.remove("immersive");
    resizeCanvas();
  }
});

function buildPanel(){
  const panel=document.getElementById("panelDynamic"); panel.innerHTML="";
  // Type buttons
  const ts=document.createElement("div"); ts.innerHTML=`<div class="section-label">ATTRACTOR TYPE</div>`;
  Object.keys(ATTRACTORS).forEach(t=>{
    const btn=document.createElement("button"); btn.className="type-btn"+(state.type===t?" active":""); btn.textContent=t;
    btn.onclick=()=>{
      state.type=t; presetIdx=0;
      fromParams={...ATTRACTORS[t].presets[0]}; toParams={...ATTRACTORS[t].presets[1]};
      morphT=0; cachedBounds=null; iterX=0.1; iterY=0.1;
      offCtx.clearRect(0,0,offscreen.width,offscreen.height);
      buildPanel();
    };
    ts.appendChild(btn);
  }); panel.appendChild(ts);
  // Live params
  const ls=document.createElement("div"); ls.innerHTML=`<div class="section-label">LIVE PARAMETERS</div>`;
  ATTRACTORS[state.type].params.forEach(k=>{
    const row=document.createElement("div"); row.className="slider-row";
    row.innerHTML=`<div class="slider-header"><span class="slider-key">${k.toUpperCase()}</span><span class="slider-val" id="live-${k}">—</span></div>
    <div style="height:2px;background:#1a0f2e;border-radius:2px;overflow:hidden"><div id="bar-${k}" style="height:100%;background:linear-gradient(90deg,#7c3aed,#c084fc);width:50%;border-radius:2px;transition:width 0.1s"></div></div>`;
    ls.appendChild(row);
  }); panel.appendChild(ls);
  // Speed
  const ss=document.createElement("div"); ss.innerHTML=`<div class="section-label">MORPH SPEED</div>`;
  const sr=document.createElement("div"); sr.className="speed-row";
  [["SLOW",0.001],["MED",0.004],["FAST",0.012],["WILD",0.03]].forEach(([label,val])=>{
    const btn=document.createElement("button"); btn.className="speed-btn"+(state.speed===val?" active":""); btn.textContent=label;
    btn.onclick=()=>{ state.speed=val; sr.querySelectorAll(".speed-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); };
    sr.appendChild(btn);
  }); ss.appendChild(sr); panel.appendChild(ss);
  // Density
  const ds=document.createElement("div"); ds.innerHTML=`<div class="section-label">DENSITY</div>`;
  const dr=document.createElement("div"); dr.className="slider-row";
  dr.innerHTML=`<div class="slider-header"><span class="slider-key">POINTS/FRAME</span><span class="slider-val" id="ppf-val">${POINTS_PER_FRAME.toLocaleString()}</span></div>
  <input type="range" min="500" max="8000" step="500" value="${POINTS_PER_FRAME}">`;
  dr.querySelector("input").oninput=e=>{window._ppf=parseInt(e.target.value);document.getElementById("ppf-val").textContent=parseInt(e.target.value).toLocaleString();};
  ds.appendChild(dr); panel.appendChild(ds);
  // Trail
  const trs=document.createElement("div"); trs.innerHTML=`<div class="section-label">TRAIL FADE</div>`;
  const trr=document.createElement("div"); trr.className="slider-row";
  trr.innerHTML=`<div class="slider-header"><span class="slider-key">PERSISTENCE</span><span class="slider-val" id="trail-val">96%</span></div>
  <input type="range" min="1" max="99" step="1" value="96">`;
  trr.querySelector("input").oninput=e=>{window._trail=parseInt(e.target.value)/100;document.getElementById("trail-val").textContent=e.target.value+"%";};
  trs.appendChild(trr); panel.appendChild(trs);
  // Palette
  const ps=document.createElement("div"); ps.innerHTML=`<div class="section-label">COLOR PALETTE</div>`;
  Object.entries(PALETTES).forEach(([name,cols])=>{
    const btn=document.createElement("button"); btn.className="palette-btn"+(state.palette===name?" active":"");
    btn.innerHTML=`<div class="swatches">${cols.slice(0,5).map(c=>`<div class="swatch" style="background:${c}"></div>`).join("")}</div>${name}`;
    btn.onclick=()=>{ state.palette=name; ps.querySelectorAll(".palette-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); };
    ps.appendChild(btn);
  }); panel.appendChild(ps);
  // DJ photo
  const phs=document.createElement("div"); phs.innerHTML=`<div class="section-label">DJ PHOTO</div>`;
  const pb=document.createElement("button"); pb.className="big-btn"; pb.textContent="📷 LOAD PHOTO";
  const pInput=document.createElement("input"); pInput.type="file"; pInput.accept="image/*"; pInput.style.display="none";
  pInput.onchange=e=>{ if(e.target.files[0]) loadNewPhoto(e.target.files[0]); };
  pb.onclick=()=>pInput.click();
  phs.appendChild(pb); phs.appendChild(pInput); panel.appendChild(phs);
  // Buttons
  const rb=document.createElement("button"); rb.className="big-btn"; rb.style.cssText="margin-top:8px";
  rb.textContent="◈ RANDOM JUMP";
  rb.onclick=()=>{ randomPreset(); cachedBounds=null; iterX=0.1; iterY=0.1; }; panel.appendChild(rb);
  const cb=document.createElement("button"); cb.className="big-btn"; cb.style.cssText="margin-top:-8px;border-color:#2a1040;color:#6b5080";
  cb.textContent="✕ CLEAR CANVAS";
  cb.onclick=()=>{ offCtx.clearRect(0,0,offscreen.width,offscreen.height); iterX=0.1; iterY=0.1; };
  panel.appendChild(cb);
}

buildPanel();
requestAnimationFrame(_patchedLoop);
</script>
</body>
</html>
