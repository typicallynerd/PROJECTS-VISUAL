<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attractor Lab — with Background</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background-color: #05020f;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .frame {
    width: 92vw;
    height: 92vh;
    border-radius: 14px;
    box-shadow: 0 0 0 1px rgba(192,132,252,0.35), 0 20px 80px rgba(0,0,0,0.7), 0 0 120px rgba(124,58,237,0.35);
    overflow: hidden;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>
  <div class="frame">
    <iframe src="attractor.html" title="Attractor Lab"></iframe>
  </div>
</body>
</html>
